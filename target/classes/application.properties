spring.application.name=aiproject

# ===== MongoDB =====
spring.data.mongodb.uri=mongodb://localhost:27017/smart_gym_db
spring.data.mongodb.database=smart_gym_db

# Disable template caching so HTML changes are reflected without restart
spring.thymeleaf.cache=false

# ===== Payment =====
# Payments are handled internally - no external payment gateway needed.
# Admin validates payment submissions manually via the admin dashboard.

# Admin key used to protect direct payment-callback API
# Change this to a strong secret before deploying
app.admin-key=CHANGE_ME_TO_A_STRONG_SECRET

# ===== ML Service =====
ml.service.url=http://localhost:5000
