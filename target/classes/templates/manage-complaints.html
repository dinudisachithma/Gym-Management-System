<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Complaints | Admin | Royal Gym</title>
  <link rel="stylesheet" href="/CSS/corporate-style.css?v=7">
  <link rel="stylesheet" href="/CSS/dashboard-styles.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=2">
  <style>
    /* Reuse tab styling from admin dashboard */
    .tab-nav-btn {
      width: 155px; padding: 13px 10px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); background: rgba(15,25,50,0.75); color: rgba(255,255,255,0.8);
      font-size: 1.0rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.25s; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .tab-nav-btn:hover { background: rgba(20,35,65,0.92); border-color: rgba(245,158,11,0.5); transform: translateY(-1px); }
    .tab-nav-btn.active-page {
      background: linear-gradient(135deg, #f59e0b, #d97706); color: #0c1222; border-color: #f59e0b; box-shadow: 0 4px 16px rgba(245,158,11,0.4); font-weight: 700;
    }
    .tab-coming-soon, .disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

    /* Complaint UI styles */
    .complaint-filter-bar {
      display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; justify-content: space-between;
    }
    .filter-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
      font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .filter-btn.active { background: rgba(56,189,248,0.15); border-color: #38bdf8; color: #38bdf8; }
    .filter-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: #fff; }

    .complaint-count-badge {
      background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; color: #f0f9ff;
    }

    /* Modal for Reply */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-content {
      background: linear-gradient(160deg, rgba(20,30,55,0.98), rgba(12,18,35,0.98)); border: 1px solid rgba(56,189,248,0.3);
      padding: 30px; border-radius: 12px; width: 600px; max-width: 95%; position: relative; border-top: 3px solid #38bdf8;
    }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1.2rem; cursor: pointer; }
    .modal-close:hover { color: #f87171; }
    .modal-content h3 { color: #f0f9ff; margin-bottom: 20px; font-size: 1.3rem; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: #cbd5e1; margin-bottom: 6px; font-weight: 600; }
    .form-control { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 8px; font-family: inherit; resize: vertical; box-sizing: border-box; }
    .form-control:focus { outline: none; border-color: #38bdf8; }
    
    .btn-submit-reply { width: 100%; padding: 12px; background: linear-gradient(135deg, #38bdf8, #0ea5e9); border: none; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-submit-reply:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(56,189,248,0.3); }
    .btn-submit-reply:disabled { opacity: 0.6; cursor: not-allowed; }

    .status-pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .sp-pending { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .sp-in-progress { background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3); }
    .sp-replied { background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }
    .sp-resolved { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }

    /* The complaint description container in modal */
    .cmp-details-box { background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    .cmp-details-box .cat { font-weight: 700; color: #f59e0b; margin-bottom: 8px; }
    .cmp-details-box .desc { color: rgba(255,255,255,0.8); line-height: 1.5; font-size: 0.95rem; white-space: pre-wrap; }
    
    .table-container { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: separate; border-spacing: 0; background: rgba(255,255,255,0.02); border-radius: 12px; overflow: hidden; }
    .data-table th, .data-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .data-table th { background: rgba(0,0,0,0.3); color: #cbd5e1; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr { transition: all 0.2s; }
    .data-table tbody tr:hover { background: rgba(255,255,255,0.04); }
    
    .btn-action-sm {
      background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3); color: #38bdf8; border-radius: 6px;
      padding: 6px 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-action-sm:hover { background: rgba(56,189,248,0.25); border-color: rgba(56,189,248,0.5); }
    
    /* Table Cell Styles */
    .ticket-id { font-weight: 600; color: #38bdf8; margin-bottom: 4px; font-size: 0.85rem; letter-spacing: 0.05em; }
    .ticket-date { color: rgba(255,255,255,0.6); }
    .member-name { font-weight: 600; color: #f0f9ff; }
    .member-id { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
    
    .btn-resolved { color: #f0f9ff; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }
    .btn-resolved:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
    
    .category-tag { color: #f59e0b; }
    .priority-tag { font-size: 0.75rem; font-weight: bold; margin-left: 8px; }
    .priority-high { color: #ef4444; }
    .priority-medium { color: #f59e0b; }
    .priority-low { color: rgba(255,255,255,0.4); }
    
    /* Thread Styles */
    .thread-block { padding: 10px; border-radius: 6px; margin-bottom: 10px; }
    .thread-header { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
    .thread-sender-name { font-size: 0.75rem; font-weight: 800; letter-spacing: 0.5px; }
    .thread-date-text { font-size: 0.72rem; color: rgba(255,255,255,0.45); }
    .thread-message-text { font-size: 0.95rem; line-height: 1.5; color: rgba(255,255,255,0.85); white-space: pre-wrap; }
    
    .thread-admin { background: rgba(56,189,248,0.1); border-left: 3px solid #38bdf8; }
    .thread-admin .thread-sender-name { color: #38bdf8; }
    .thread-member { background: rgba(255,255,255,0.05); border-left: 3px solid #cbd5e1; }
    .thread-member .thread-sender-name { color: #cbd5e1; }
    
    /* LIGHT MODE OVERRIDES */
    body.light-mode .filter-btn { color: #475569 !important; border-color: #cbd5e1 !important; background: #f8fafc !important; }
    body.light-mode .filter-btn:hover:not(.active) { background: #e2e8f0 !important; color: #0f172a !important; }
    body.light-mode .filter-btn.active { background: #e0f2fe !important; border-color: #0284c7 !important; color: #0284c7 !important; }
    
    body.light-mode .complaint-count-badge { background: #e0f2fe !important; color: #0369a1 !important; border: 1px solid #bae6fd !important; }

    body.light-mode .sp-pending { background: #fef3c7 !important; color: #b45309 !important; border-color: #d97706 !important; }
    body.light-mode .sp-in-progress { background: #dbeafe !important; color: #1d4ed8 !important; border-color: #2563eb !important; }
    body.light-mode .sp-replied { background: #f3e8ff !important; color: #7e22ce !important; border-color: #9333ea !important; }
    body.light-mode .sp-resolved { background: #dcfce7 !important; color: #15803d !important; border-color: #16a34a !important; }

    body.light-mode .modal-content h3 { color: #0f172a !important; }
    body.light-mode .cmp-details-box { background: #ffffff !important; border-color: #cbd5e1 !important; color: #1e293b !important; }
    body.light-mode .cmp-details-box .desc { color: #1e293b !important; }
    body.light-mode #conversationThread { background: #ffffff !important; border-color: #cbd5e1 !important; }
    
    body.light-mode .thread-date-text { color: #64748b !important; }
    body.light-mode .thread-message-text { color: #1e293b !important; font-weight: 500; }
    body.light-mode .thread-admin { background: #bfdbfe !important; border-left-color: #2563eb !important; }
    body.light-mode .thread-admin .thread-sender-name { color: #1d4ed8 !important; }
    body.light-mode .thread-member { background: #fde68a !important; border-left-color: #d97706 !important; }
    body.light-mode .thread-member .thread-sender-name { color: #b45309 !important; }
    
    /* LIGHT MODE TABLE TEXT OVERRIDES */
    body.light-mode .ticket-id { color: #0284c7 !important; }
    body.light-mode .ticket-date { color: #475569 !important; font-weight: 500; }
    body.light-mode .member-name { color: #0f172a !important; }
    body.light-mode .member-id { color: #64748b !important; }
    body.light-mode .category-tag { color: #b45309 !important; }
    body.light-mode .priority-medium { color: #b45309 !important; }
    body.light-mode .priority-low { color: #64748b !important; }
    body.light-mode .btn-resolved { color: #334155 !important; border-color: #cbd5e1 !important; background: #f8fafc !important; }
    body.light-mode .btn-resolved:hover { background: #e2e8f0 !important; }
  </style>
</head>
<body class="dashboard-dark">
  <nav class="top-nav">
    <div class="nav-container">
      <div class="nav-left">
        <h2><i class="fas fa-dumbbell"></i> Royal Gym</h2>
      </div>
      <div class="nav-right">
        <button id="themeToggleBtn" class="icon-button" style="margin-right:8px; color:#a5b4fc;" onclick="toggleTheme()" title="Toggle Light/Dark Theme">
          <i class="fas fa-moon"></i>
        </button>
        <a href="/admin-dashboard" class="btn" style="background: #ef4444; color: #fff; padding: 8px 16px; border-radius: 8px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;" onmouseover="this.style.background='#dc2626'" onmouseout="this.style.background='#ef4444'">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>
  </nav>

  <!-- ── Admin Hero Strip ── -->
  <div id="adminHeroStrip" class="admin-hero-strip" style="background:linear-gradient(135deg,rgba(10,16,32,0.97) 0%,rgba(20,38,80,0.92) 60%,rgba(10,16,32,0.97) 100%);border-bottom:1px solid rgba(245,158,11,0.2);padding:20px 0 16px;margin-bottom:0;">
    <div style="max-width:1440px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
      <div>
        <h2 class="hero-title">
          <i class="fas fa-exclamation-circle"></i> &nbsp;Manage Complaints
        </h2>
        <p style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin:0;">Manage member issues and track resolution status</p>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:30px;background:linear-gradient(135deg,rgba(56,189,248,0.18),rgba(14,165,233,0.08));border:1px solid rgba(56,189,248,0.3);color:#38bdf8;font-size:0.82rem;font-weight:700;">
          <i class="fas fa-list"></i>
          <span id="heroTotalComplaints">—</span> Total
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:30px;background:linear-gradient(135deg,rgba(245,158,11,0.18),rgba(217,119,6,0.08));border:1px solid rgba(245,158,11,0.3);color:#f59e0b;font-size:0.82rem;font-weight:700;">
          <i class="fas fa-clock"></i>
          <span id="heroPendingComplaints">—</span> Pending
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:30px;background:linear-gradient(135deg,rgba(16,185,129,0.18),rgba(5,150,105,0.08));border:1px solid rgba(16,185,129,0.3);color:#34d399;font-size:0.82rem;font-weight:700;">
          <i class="fas fa-check-circle"></i>
          <span id="heroResolvedComplaints">—</span> Resolved
        </div>
      </div>
    </div>
  </div>

  <main class="main-content">
    <div class="container">
      <div class="card" style="padding: 24px;">
        <div class="card-header" style="border-bottom: 1px solid rgba(14,165,233,0.12); padding-bottom: 16px; margin-bottom: 20px;">
          <h3 style="margin:0; font-size: 1.25rem;" class="card-heading-complaints"><i class="fas fa-exclamation-circle" style="color:#ef4444;"></i> Manage Complaints</h3>
        </div>
        
        <div class="complaint-filter-bar">
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-list"></i> All</button>
            <button class="filter-btn" data-filter="Pending"><i class="fas fa-clock" style="color:#f59e0b;"></i> Pending</button>
            <button class="filter-btn" data-filter="In Progress"><i class="fas fa-spinner" style="color:#38bdf8;"></i> In Progress</button>
            <button class="filter-btn" data-filter="Replied"><i class="fas fa-reply-all" style="color:#a855f7;"></i> Replied</button>
            <button class="filter-btn" data-filter="Resolved"><i class="fas fa-check-circle" style="color:#10b981;"></i> Resolved</button>
          </div>
          <div style="display: flex; gap: 15px; align-items: center;">
            <select id="priorityFilter" class="form-control" style="width: auto; padding: 6px 16px; font-size: 0.85rem; height: 35px; border-radius: 20px; min-width: 140px;">
              <option value="all" style="background: #0f172a; color: #f0f9ff;">All Priorities</option>
              <option value="High" style="background: #0f172a; color: #f0f9ff;">High / Urgent</option>
              <option value="Medium" style="background: #0f172a; color: #f0f9ff;">Medium</option>
              <option value="Low" style="background: #0f172a; color: #f0f9ff;">Low</option>
            </select>
            <div class="complaint-count-badge">
              <span id="txtCount">0</span> Complaints
            </div>
          </div>
        </div>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Ticket & Date</th>
                <th>Member</th>
                <th>Category</th>
                <th>Status</th>
                <th style="text-align:right;">Actions</th>
              </tr>
            </thead>
            <tbody id="complaintsTableBody">
              <tr>
                <td colspan="5" style="text-align:center; padding: 40px; color: rgba(255,255,255,0.4);">
                  <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 12px;"></i>
                  <p>Loading complaints...</p>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Reply Modal -->
  <div class="modal-overlay" id="replyModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeReplyModal()"><i class="fas fa-times"></i></button>
      <h3><i class="fas fa-reply" style="color:#38bdf8;"></i> View & Respond</h3>
      
      <div class="cmp-details-box">
        <div class="cat" id="cmpCat">--</div>
        <div class="desc" id="cmpDesc">--</div>
      </div>

      <div id="conversationThread" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.15); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 12px;">
         <!-- Thread items injected via JS -->
      </div>


      <form id="replyForm">
        <input type="hidden" id="complaintId">
        <div class="form-group" style="display:none;">
          <label>Update Status</label>
          <!-- Hidden because it's auto-managed based on action -->
          <input type="hidden" id="replyStatus" value="Resolved">
        </div>
        <div class="form-group">
          <label>Add Reply Message</label>
          <textarea id="replyMessage" class="form-control" rows="3" placeholder="Type your response to the member..." required></textarea>
        </div>
        <button type="submit" class="btn-submit-reply" id="btnSubmitReply"><i class="fas fa-paper-plane"></i> Send Reply</button>
      </form>
    </div>
  </div>

  <script src="/JS/custom-alerts.js"></script>
  <script src="/JS/manage-complaints.js?v=7"></script>
  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-mode');
    }
    window.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeToggleBtn');
      if (btn && document.body.classList.contains('light-mode')) {
        btn.innerHTML = '<i class="fas fa-sun"></i>';
        btn.style.color = '#fcd34d';
        btn.style.background = 'rgba(245,158,11,0.15)';
        btn.style.borderColor = 'rgba(245,158,11,0.4)';
      }
    });
    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById('themeToggleBtn');
      body.classList.toggle('light-mode');
      if (body.classList.contains('light-mode')) {
        localStorage.setItem('theme', 'light');
        btn.innerHTML = '<i class="fas fa-sun"></i>';
        btn.style.color = '#fcd34d';
        btn.style.background = 'rgba(245,158,11,0.15)';
        btn.style.borderColor = 'rgba(245,158,11,0.4)';
      } else {
        localStorage.setItem('theme', 'dark');
        btn.innerHTML = '<i class="fas fa-moon"></i>';
        btn.style.color = '#a5b4fc';
        btn.style.background = 'rgba(255,255,255,0.05)';
        btn.style.borderColor = 'rgba(255,255,255,0.08)';
      }
    }
  </script>
</body>
</html>
