<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Royal Gym</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/CSS/member-login.css">
</head>
<body>
<div class="login-split">
  <!-- Left visual -->
  <div class="login-visual">
    <div class="login-visual-content">
    </div>
  </div>

  <!-- Right form panel -->
  <div class="login-form-panel">
    <div class="logo">
      <i class="fas fa-dumbbell"></i>
      <h1>Royal Gym</h1>
    </div>
    <h3>Sign In</h3>
    <p class="sub">Enter your credentials to access your account.</p>

    <div id="loginErrorBanner" style="display:none; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:10px; padding:12px 16px; margin-bottom:20px; color:#ef4444; font-size:0.9rem; align-items:center; gap:10px;">
      <i class="fas fa-exclamation-triangle"></i>
      <span id="loginErrorText">Invalid credentials</span>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="error-message" id="emailError"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <i class="fas fa-eye pwtoggle" onclick="togglePw()"></i>
        </div>
        <div class="error-message" id="passwordError"></div>
      </div>

      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i> Sign In
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="/register">Create one</a></p>
      <a href="/" class="back-link"><i class="fas fa-arrow-left" style="margin-right:4px;"></i> Back to Home</a>
    </div>
  </div>
</div>
<script src="/JS/member-login.js"></script>
</body>
</html>
