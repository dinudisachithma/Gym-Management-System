<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled | Royal Gym</title>
    <link rel="stylesheet" href="/CSS/corporate-style.css">
    <link rel="stylesheet" href="/CSS/dashboard-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .cancel-card {
            max-width: 480px;
            width: 100%;
            padding: 48px 40px;
            background: var(--charcoal, #1e1e2e);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            text-align: center;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cancel-icon {
            width: 72px;
            height: 72px;
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid rgba(239, 68, 68, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 1.8rem;
            color: #ef4444;
        }

        .cancel-card h1 {
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 12px;
        }

        .cancel-card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.94rem;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 11px 24px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity .2s;
        }

        .btn-retry:hover {
            opacity: 0.88;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            padding: 11px 24px;
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="dashboard-dark">
    <div class="cancel-card">
        <div class="cancel-icon"><i class="fas fa-times"></i></div>
        <h1>Payment Cancelled</h1>
        <p>You cancelled the payment process. No charges were made to your card. You can try again anytime by going back
            to your dashboard and selecting a package.</p>
        <div class="actions">
            <a href="/member-dashboard" class="btn-retry">
                <i class="fas fa-redo"></i> Try Again
            </a>
            <a href="/member-dashboard" class="btn-back">
                <i class="fas fa-home"></i> Dashboard
            </a>
        </div>
    </div>
</body>

</html>
