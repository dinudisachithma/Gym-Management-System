<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password | Royal Gym</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/CSS/corporate-style.css">
  <link rel="stylesheet" href="/CSS/dashboard-styles.css">
  <style>
    .pw-container { max-width: 700px; margin: 40px auto; padding: 0 24px; }
    .pw-card {
      background: rgba(18,26,42,0.92);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(56,189,248,0.2);
      border-top: 3px solid #38bdf8;
      box-shadow: 0 16px 40px rgba(0,0,0,0.55), 0 0 30px rgba(56,189,248,0.12);
      border-radius: 16px;
      padding: 42px 40px;
    }
    .pw-card h2 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .pw-card .sub { color: rgba(255,255,255,0.5); font-size: 0.92rem; margin-bottom: 32px; border-bottom: 1px solid rgba(56,189,248,0.15); padding-bottom: 20px; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.65); margin-bottom: 9px; text-transform: uppercase; letter-spacing: 0.06em; }
    .input-wrap { position: relative; }
    .input-wrap i.icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(56,189,248,0.6); pointer-events: none; }
    .input-wrap input { width: 100%; padding: 14px 44px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.14); border-radius: 9px; color: #fff; font-size: 0.97rem; font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .input-wrap input:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }
    .error-message { color: #f87171; font-size: 0.82rem; margin-top: 5px; display: none; }
    .form-actions { display: flex; gap: 14px; margin-top: 32px; }
    .btn-save { flex: 1; padding: 15px; background: #0ea5e9; color: #fff; border: none; border-radius: 9px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(14,165,233,0.35); }
    .btn-save:hover { background: #0284c7; box-shadow: 0 6px 22px rgba(14,165,233,0.5); transform: translateY(-1px); }
    .btn-back { padding: 15px 30px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); border-radius: 9px; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.12); border-color: rgba(245,158,11,0.3); }
    .input-wrap { position: relative !important; width: 100%; display: block; }
    .input-wrap input { width: 100%; padding: 14px 44px 14px 44px !important; }
    .input-wrap .pwtoggle { 
      position: absolute !important; 
      right: 14px !important; 
      top: 50% !important; 
      transform: translateY(-50%) !important; 
      color: rgba(56,189,248,0.7); 
      cursor: pointer; 
      user-select: none; 
      z-index: 10;
      transition: color 0.2s; 
    }
    .input-wrap .pwtoggle:hover { color: #38bdf8; }
    .pw-hint { font-size: 0.78rem; color: rgba(255,255,255,0.35); margin-top: 5px; }
    .pw-strength { font-size: 0.82rem; margin-top: 6px; font-weight: 600; transition: color 0.3s; min-height: 18px; }

    /* LIGHT MODE OVERRIDES */
    body.light-mode { background: #eef2f6 !important; }
    body.light-mode .pw-card {
      background: #ffffff;
      backdrop-filter: none;
      border: 1px solid #cbd5e1;
      border-top: 4px solid #1d4ed8;
      box-shadow: 0 4px 12px rgba(15,23,42,0.06);
    }
    body.light-mode .pw-card h2, body.light-mode .pw-card i.fa-key { color: #0f172a !important; }
    body.light-mode .pw-card .sub { color: #64748b; border-bottom: 1px solid #e2e8f0; }
    body.light-mode .form-group label { color: #334155; }
    body.light-mode .input-wrap input {
      background: #ffffff;
      border: 1px solid #94a3b8;
      color: #0f172a;
      font-weight: 700;
      box-shadow: inset 0 1px 3px rgba(15,23,42,0.05);
    }
    body.light-mode .input-wrap input:focus { border-color: #1d4ed8; box-shadow: 0 0 0 2px rgba(29,78,216,0.15); }
    body.light-mode .input-wrap input::placeholder { color: #94a3b8; font-weight: 500; }
    body.light-mode .input-wrap i.icon { color: #64748b; }
    body.light-mode .input-wrap .pwtoggle { color: #475569 !important; }
    body.light-mode .input-wrap .pwtoggle:hover { color: #1d4ed8 !important; }
    body.light-mode .pw-hint { color: #64748b; }
    body.light-mode .btn-save { background: #1d4ed8; color: #ffffff; box-shadow: 0 4px 12px rgba(29,78,216,0.25); border-radius: 6px; }
    body.light-mode .btn-save:hover { background: #1e3a8a; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(29,78,216,0.3); }
    body.light-mode .btn-back { background: #f8fafc; border: 1px solid #cbd5e1; color: #475569; border-radius: 6px; }
    body.light-mode .btn-back:hover { background: #f1f5f9; color: #0f172a; border-color: #94a3b8; }
  </style>
</head>
<body class="dashboard-dark">
  <nav class="top-nav">
    <div class="nav-container">
      <div class="nav-left">
        <h2><i class="fas fa-dumbbell"></i> Royal Gym</h2>
      </div>
      <div class="nav-center"></div>
      <div class="nav-right">
        <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="pw-container">
      <div class="pw-card">
        <h2><i class="fas fa-key" style="color:#38bdf8;margin-right:10px;"></i>Change Password</h2>
        <p class="sub">Enter your current password and choose a new one.</p>

        <form id="changePasswordForm" novalidate>
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <div class="input-wrap">
              <i class="fas fa-lock icon"></i>
              <input type="password" id="currentPassword" placeholder="Your current password" autocomplete="current-password">
              <i class="fas fa-eye pwtoggle" onclick="togglePwField('currentPassword', this)"></i>
            </div>
            <div class="error-message" id="currentPasswordError"></div>
          </div>

          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="input-wrap">
              <i class="fas fa-lock icon"></i>
              <input type="password" id="newPassword" placeholder="Min. 6 chars, one uppercase" autocomplete="new-password">
              <i class="fas fa-eye pwtoggle" onclick="togglePwField('newPassword', this)"></i>
            </div>
            <div class="pw-strength" id="pwStrength"></div>
            <p class="pw-hint">At least 6 characters and one uppercase letter (A–Z).</p>
            <div class="error-message" id="newPasswordError"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <div class="input-wrap">
              <i class="fas fa-lock icon"></i>
              <input type="password" id="confirmPassword" placeholder="Repeat new password" autocomplete="new-password">
              <i class="fas fa-eye pwtoggle" onclick="togglePwField('confirmPassword', this)"></i>
            </div>
            <div class="error-message" id="confirmPasswordError"></div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-back" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
            <button type="submit" class="btn-save"><i class="fas fa-shield-alt"></i> Update Password</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="/JS/custom-alerts.js"></script>
  <script src="/JS/member-change-password.js"></script>
</body>
</html>
