version: '3.8'
services:
  gym-app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - ml-service
    environment:
      - ML_SERVICE_URL=http://ml-service:5000
    networks:
      - gym-network

  ml-service:
    build: ./gym-ml-service
    ports:
      - "5000:5000"
    networks:
      - gym-network

networks:
  gym-network:
    driver: bridge